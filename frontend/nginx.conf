server {
    listen 80;
    server_name sorokindev.ru www.sorokindev.ru;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name sorokindev.ru www.sorokindev.ru;

    # Исправлено: путь к сертификатам для нового домена
    ssl_certificate /etc/letsencrypt/live/sorokindev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sorokindev.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}